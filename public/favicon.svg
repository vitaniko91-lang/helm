<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Helm">
  <!-- Editorial Atelier mark: warm paper tile, high-contrast serif "H" in ink,
       a single oxblood square set like a colophon full-stop. -->
  <rect width="64" height="64" rx="13" fill="#F4F1EA"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="12.5" fill="none" stroke="#14110F" stroke-opacity="0.10"/>
  <g fill="#14110F">
    <!-- stems -->
    <rect x="18" y="16" width="8" height="32"/>
    <rect x="38" y="16" width="8" height="32"/>
    <!-- crossbar (thinner — old-style contrast) -->
    <rect x="25" y="28.5" width="14" height="6"/>
    <!-- bracketed serifs -->
    <rect x="15" y="15" width="14" height="3"/>
    <rect x="35" y="15" width="14" height="3"/>
    <rect x="15" y="46" width="14" height="3"/>
    <rect x="35" y="46" width="14" height="3"/>
  </g>
  <!-- oxblood colophon mark -->
  <rect x="49" y="41" width="8" height="8" fill="#7B2D26"/>
</svg>
